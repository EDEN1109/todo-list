<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 인증 화면 (로그아웃 상태에서 표시) -->
  <div class="auth-overlay" id="auth-overlay">
    <h1 class="auth-title">TODO List</h1>
    <p class="auth-subtitle">오늘 할 일을 정리해보세요</p>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">로그인</button>
      <button class="auth-tab" id="tab-signup">회원가입</button>
    </div>
    <form class="auth-form" id="auth-form">
      <input type="email" class="auth-input" id="auth-email" placeholder="이메일" required autocomplete="email" />
      <input type="password" class="auth-input" id="auth-password" placeholder="비밀번호 (6자 이상)" required minlength="6" />
      <button type="submit" class="auth-submit-btn" id="auth-submit-btn">로그인</button>
    </form>
    <p class="auth-message" id="auth-message"></p>
  </div>

  <!-- 앱 화면 (로그인 상태에서 표시) -->
  <div class="container hidden">
    <header class="header">
      <div class="header-top">
        <div>
          <h1 class="title">TODO List</h1>
          <p class="subtitle">오늘 할 일을 정리해보세요</p>
        </div>
        <div class="header-user">
          <span class="user-email" id="user-email"></span>
          <button class="logout-btn" id="logout-btn">로그아웃</button>
        </div>
      </div>
    </header>

    <section class="group-mgmt-section" id="group-mgmt-section">
      <div class="group-mgmt-header">
        <span class="group-mgmt-title">그룹</span>
        <button class="group-add-toggle-btn" id="group-add-toggle-btn">+ 그룹추가</button>
      </div>
      <div class="group-add-form hidden" id="group-add-form">
        <input type="text" class="group-name-input" id="group-name-input" placeholder="그룹 이름..." maxlength="20" autocomplete="off"/>
        <button type="button" class="group-confirm-btn" id="group-confirm-btn">확인</button>
      </div>
      <div class="group-chips" id="group-chips"></div>
    </section>

    <section class="input-section">
      <form class="input-form" id="todo-form">
        <div class="input-row">
          <input
            type="text"
            class="todo-input"
            id="todo-input"
            placeholder="할 일을 입력하세요..."
            autocomplete="off"
            maxlength="100"
          />
          <button type="submit" class="add-btn">추가</button>
        </div>
        <div class="input-extras">
          <button type="button" class="desc-toggle-btn" id="desc-toggle-btn">+ 설명 추가</button>
          <select class="group-select" id="group-select">
            <option value="">그룹 없음</option>
          </select>
        </div>
        <textarea
          class="desc-input"
          id="desc-input"
          placeholder="설명을 입력하세요... (선택사항)"
          maxlength="300"
          rows="2"
        ></textarea>
      </form>
    </section>

    <section class="filter-section">
      <div class="group-filter" id="group-filter">
        <button class="group-filter-btn active" data-group="all">전체</button>
      </div>
      <div class="status-filter">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="active">진행 중</button>
        <button class="filter-btn" data-filter="completed">완료</button>
      </div>
    </section>

    <section class="list-section">
      <ul class="todo-list" id="todo-list"></ul>
      <div class="empty-state" id="empty-state">
        <p>할 일이 없습니다. 새 항목을 추가해보세요!</p>
      </div>
    </section>

    <footer class="footer">
      <span class="count-text" id="count-text">0개 남음</span>
      <button class="clear-btn" id="clear-btn">완료 항목 삭제</button>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
